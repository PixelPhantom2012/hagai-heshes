<style>
        /* Nav — dark glass over hero by default, light when scrolled past */
        .nav { background: rgba(255,255,255,0.06); backdrop-filter: blur(32px) saturate(180%); -webkit-backdrop-filter: blur(32px) saturate(180%); border-bottom: 1px solid rgba(255,255,255,0.12); box-shadow: inset 0 1px 0 rgba(255,255,255,0.22); border-radius: 48px 48px 0 0; margin: 0; position: sticky; top: 0; z-index: 100; transition: background 0.35s, border-color 0.35s; }
        .nav.nav--light { background: rgba(248, 247, 244, 0.94); border-bottom: 1px solid var(--border-color); border-radius: 0; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
        .nav .container { display: flex; align-items: center; justify-content: space-between; height: var(--nav-h); }
        .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 15px; letter-spacing: -0.01em; color: #fff; transition: color 0.35s; }
        .nav--light .nav-logo { color: var(--text-dark); }
        .nav-logo-crystal { display: flex; align-items: center; }
        .crystal-base { fill: rgba(255,255,255,0.82); transition: fill 0.35s; }
        .nav--light .crystal-base { fill: #2D2AE8; }
        .crystal-shade { fill: rgba(255,255,255,0.07); transition: fill 0.35s; }
        .nav--light .crystal-shade { fill: rgba(0,0,50,0.18); }
        .nav-links { display: flex; align-items: center; gap: 32px; }
        .nav-link { font-size: 14px; color: rgba(255,255,255,0.60); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .nav-link:hover { color: #fff; }
        .nav--light .nav-link { color: #666; }
        .nav--light .nav-link:hover { color: var(--text-dark); }
        .nav-cta { font-size: 14px; font-weight: 500; background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.22); color: #fff; padding: 10px 22px; border-radius: 4px; text-decoration: none; transition: background 0.2s, border-color 0.35s, color 0.35s; }
        .nav-cta:hover { background: rgba(255,255,255,0.20); }
        .nav--light .nav-cta { background: var(--text-dark); border-color: transparent; color: #fff; }
        .nav--light .nav-cta:hover { background: var(--accent-blue); }

        /* Hero shell */
        .hero-shell {
            background: linear-gradient(135deg, #1e2633 0%, #18202c 50%, #10151f 100%);
            border-radius: 48px 48px 0 0;
            margin: 20px 16px 0;
            position: relative;
        }

        /* Hero */
        .hero { background: transparent; color: #fff; position: relative; overflow: hidden; }
        .hero .container { display: grid; grid-template-columns: 1.2fr 0.8fr; min-height: 580px; align-items: center; position: relative; z-index: 3; }
        .hero-left { padding: 80px 0; }
        .hero-title { font-size: 68px; font-weight: 400; line-height: 1.05; font-family: var(--font-serif); margin-bottom: 28px; letter-spacing: -0.02em; }
        .hero-sub { font-size: 17px; color: rgba(190,212,232,0.72); line-height: 1.68; max-width: 440px; margin-bottom: 40px; font-weight: 400; }
        .btn-primary { font-size: 14px; font-weight: 500; background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.22); color: #fff; padding: 13px 28px; border-radius: 6px; text-decoration: none; transition: transform 0.2s, background 0.2s; display: inline-block; letter-spacing: 0.01em; }
        .btn-primary:hover { background: rgba(255,255,255,0.18); transform: translateY(-1px); }

        /* Hero mesh overlay */
        .hero-mesh { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

        /* Hero crystal */
        .hero-crystal { position: absolute; right: -60px; top: 50%; transform: translateY(-50%); width: 58%; max-width: 680px; z-index: 2; pointer-events: none; mask-image: linear-gradient(to left, rgba(0,0,0,0.95) 55%, rgba(0,0,0,0) 100%); -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,0.95) 55%, rgba(0,0,0,0) 100%); }
        .hero-crystal img { width: 100%; height: auto; display: block; }
</style>
